$def with (contacto)
<h2>Modificar Contacto</h2>
<form method="POST" action="/contacto/modificar/$contacto.id_contacto" style="max-width: 500px; margin-top: 20px;">
    <label>Nombre:</label>
    <input type="text" name="nombre" value="$contacto.nombre" required>
    
    <label>Teléfono:</label>
    <input type="text" name="telefono" value="$contacto.telefono" required>
    
    <label>Email:</label>
    <input type="email" name="email" value="$contacto.email">
    
    <br><br>
    <button type="submit">Actualizar Cambios</button>
    <a href="/contactos" style="margin-left: 15px; color: #6c757d;">Cancelar</a>
</form>
